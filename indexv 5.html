<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ice Born Gems</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0c0e11;--bg2:#111418;--bg3:#161a1f;--fg:#e8edf2;--fg3:#6b7a87;--gold:#b8c8d4;--gold2:#8fa5b5;--border:#1e252d;--border2:#252e38}
    body{background:var(--bg);color:var(--fg);font-family:"Jost",sans-serif;font-weight:300;min-height:100vh}
    nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;background:rgba(12,14,17,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .logo{font-family:"Cormorant Garamond",serif;font-size:1.1rem;letter-spacing:.12em;color:var(--gold);text-decoration:none}
    .nav-right{display:flex;gap:.2rem;flex-wrap:wrap}
    .nb{background:none;border:none;cursor:pointer;font-family:"Jost",sans-serif;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);padding:.35rem .6rem;border-radius:2rem;transition:all .15s}
    .nb:hover{color:var(--fg);background:var(--bg3)}
    .nb.active{color:var(--gold);background:var(--bg3);border:1px solid var(--border2)}
    .hero{text-align:center;padding:4.5rem 1rem 3rem;border-bottom:1px solid var(--border)}
    .eyebrow{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--fg3);margin-bottom:1.2rem}
    h1{font-family:"Cormorant Garamond",serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;line-height:1.05;margin-bottom:1rem}
    h1 em{font-style:italic;color:var(--gold)}
    .sub{font-size:.82rem;color:var(--fg3);max-width:360px;margin:0 auto;line-height:1.8}
    .filters{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
    .fb{background:none;border:1px solid transparent;border-radius:2rem;cursor:pointer;font-family:"Jost",sans-serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);padding:.28rem .7rem;transition:all .15s}
    .fb:hover{border-color:var(--border2);color:var(--fg)}
    .fb.active{border-color:var(--gold2);color:var(--gold);background:rgba(184,200,212,.06)}
    .count{margin-left:auto;font-size:.62rem;color:var(--fg3)}
    .grid{padding:1.8rem 2rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.9rem}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .18s,transform .18s}
    .card:hover{border-color:var(--border2);transform:translateY(-2px)}
    .thumb{aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
    .card:hover .thumb img{transform:scale(1.05)}
    .thumb svg{opacity:.2;width:56px;height:56px}
    .info{padding:.75rem .85rem .85rem}
    .ccat{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3);margin-bottom:.25rem}
    .cname{font-family:"Cormorant Garamond",serif;font-size:.9rem;line-height:1.3;margin-bottom:.5rem}
    .cfoot{display:flex;align-items:center;justify-content:space-between}
    .cprice{font-family:"Cormorant Garamond",serif;font-size:.95rem;color:var(--gold)}
    .cprice small{font-family:"Jost",sans-serif;font-size:.55rem;color:var(--fg3)}
    .ccta{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);border:1px solid var(--border2);border-radius:3px;padding:.22rem .5rem;background:none;cursor:pointer;font-family:"Jost",sans-serif;transition:all .15s}
    .card:hover .ccta{border-color:var(--gold2);color:var(--gold)}
    .overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,10,13,.9);backdrop-filter:blur(8px);padding:1rem;align-items:center;justify-content:center}
    .overlay.open{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;max-width:400px;width:100%;position:relative;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
    .mimg{aspect-ratio:1;max-height:240px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .mimg img{width:100%;height:100%;object-fit:cover}
    .mimg svg{opacity:.15;width:80px;height:80px}
    .mbody{padding:1.4rem;overflow-y:auto}
    .mclose{position:absolute;top:.8rem;right:.8rem;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--fg3);font-size:.85rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .15s}
    .mclose:hover{color:var(--fg);border-color:var(--gold2)}
    .mcat{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3);margin-bottom:.4rem}
    .mname{font-family:"Cormorant Garamond",serif;font-size:1.45rem;line-height:1.2;margin-bottom:.4rem}
    .mdesc{font-size:.72rem;color:var(--fg3);margin-bottom:.9rem;line-height:1.6}
    .mprice{font-family:"Cormorant Garamond",serif;font-size:1.8rem;font-weight:300;color:var(--gold);margin-bottom:1.3rem}
    .mprice small{font-family:"Jost",sans-serif;font-size:.65rem;color:var(--fg3)}
    .btn-buy{display:block;width:100%;padding:.85rem;background:rgba(184,200,212,.08);border:1px solid var(--gold2);border-radius:4px;font-family:"Jost",sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);text-align:center;text-decoration:none;transition:all .2s}
    .btn-buy:hover{background:rgba(184,200,212,.18)}
    .loading{grid-column:1/-1;text-align:center;padding:4rem;color:var(--fg3);font-size:.75rem;letter-spacing:.1em}
    footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--fg3);font-size:.68rem;letter-spacing:.08em}
    footer span{font-family:"Cormorant Garamond",serif;font-size:.95rem;color:var(--gold);display:block;margin-bottom:.4rem}
    @media(max-width:600px){nav{padding:0 1rem}.filters,.grid{padding:1rem}.hero{padding:3rem 1rem 2rem}}
  </style>
</head>

AZHN2wQE", "imageUrl": "", "paymentLink": ""}, {"id": "prod_UhgBivJ9aq6xVg", "name": "Moissanite Bracelet 18k Gold", "description": "Moissanite 6 inches 3mm Tennis Bracelet 18k Gold", "category": "Bracelets", "price": 3300.0, "priceId": "price_1TiGooFO10z4Rb8pjJasDJlO", "imageUrl": "", "paymentLink": ""}, {"id": "prod_UhgAKqYATDDTzE", "name": "Moissanite Bracelet 18k Gold", "description": "Moissanite 7 inches 3mm Tennis Bracelet 18k Gold", "category": "Bracelets", "price": 3400.0, "priceId": "price_1TiGntFO10z4Rb8p2eX12p4S", "imageUrl": "", "paymentLink": ""}];
const IC={
  Watches:'<svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="22" stroke="#c8d4dc" stroke-width="1.5"/><line x1="40" y1="29" x2="40" y2="40" stroke="#c8d4dc" stroke-width="2" stroke-linecap="round"/><line x1="40" y1="40" x2="49" y2="45" stroke="#c8d4dc" stroke-width="1.5" stroke-linecap="round"/></svg>',
  Bracelets:'<svg viewBox="0 0 80 80" fill="none"><ellipse cx="40" cy="42" rx="24" ry="13" stroke="#c8d4dc" stroke-width="1.5"/></svg>',
  Necklaces:'<svg viewBox="0 0 80 80" fill="none"><path d="M18 18 Q40 64 62 18" stroke="#c8d4dc" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="40" cy="60" r="5" stroke="#c8d4dc" stroke-width="1.2"/></svg>',
  Rings:'<svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="20" stroke="#c8d4dc" stroke-width="2.5"/></svg>',
  Earrings:'<svg viewBox="0 0 80 80" fill="none"><circle cx="27" cy="25" r="6" stroke="#c8d4dc" stroke-width="1.2"/><line x1="27" y1="31" x2="27" y2="50" stroke="#c8d4dc" stroke-width="1.2"/><circle cx="27" cy="55" r="5" stroke="#c8d4dc" stroke-width="1.2"/><circle cx="53" cy="25" r="6" stroke="#c8d4dc" stroke-width="1.2"/><line x1="53" y1="31" x2="53" y2="50" stroke="#c8d4dc" stroke-width="1.2"/><circle cx="53" cy="55" r="5" stroke="#c8d4dc" stroke-width="1.2"/></svg>',
  Other:'<svg viewBox="0 0 80 80" fill="none"><rect x="20" y="20" width="40" height="40" rx="4" stroke="#c8d4dc" stroke-width="1.5"/></svg>'
};
const CATS=['Tout','Montres','Bracelets','Colliers','Bagues','Boucles d\'oreilles'];
const CEN={'Tout':'All','Montres':'Watches','Bracelets':'Bracelets','Colliers':'Necklaces','Bagues':'Rings','Boucles d\'oreilles':'Earrings'};
const CFR={'Watches':'Montres','Bracelets':'Bracelets','Necklaces':'Colliers','Rings':'Bagues','Earrings':'Boucles d\'oreilles','Other':'Autre'};
let cat='Tout',cur=[],P=STATIC;
const $=id=>document.getElementById(id);
function fmt(n){return '$'+Number(n).toLocaleString('fr-CA');}
function fil(){const e=CEN[cat];return cat==='Tout'?P:P.filter(p=>p.category===e);}
function render(){
  cur=fil();
  $('NR').innerHTML=CATS.map(c=>`<button class="nb${cat===c?' active':''}" onclick="setC('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');
  $('FB').innerHTML=CATS.map(c=>`<button class="fb${cat===c?' active':''}" onclick="setC('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')+`<span class="count">${cur.length} article${cur.length>1?'s':''}</span>`;
  $('GR').innerHTML=cur.length?cur.map((p,i)=>{
    const ic=IC[p.category]||IC.Other;
    const th=p.imageUrl?`<img src="${p.imageUrl}" alt="" loading="lazy" onerror="this.outerHTML='${ic.replace(/'/g,"\\'").replace(/"/g,"&quot;")}'">`  :ic;
    return `<article class="card" onclick="openM(${i})">
      <div class="thumb">${th}</div>
      <div class="info">
        <div class="ccat">${CFR[p.category]||p.category}</div>
        <div class="cname">${p.name}</div>
        <div class="cfoot"><div class="cprice">${fmt(p.price)} <small>CAD</small></div><span class="ccta">Acheter</span></div>
      </div></article>`;
  }).join(''):'<div class="loading">Aucun produit.</div>';
}
function openM(i){
  const p=cur[i];if(!p)return;
  const ic=IC[p.category]||IC.Other;
  $('MI').innerHTML=p.imageUrl?`<img src="${p.imageUrl}" alt="">`:`<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%">${ic}</div>`;
  $('MC').textContent=CFR[p.category]||p.category;
  $('MN').textContent=p.name;
  $('MD').textContent=p.description||'';
  $('MP').innerHTML=`${fmt(p.price)} <small>CAD</small>`;
  $('MB').href=p.paymentLink||'mailto:info@iceborngems.shop?subject=Demande: '+encodeURIComponent(p.name);
  $('OV').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){$('OV').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function setC(c){cat=c;render();scrollTo(0,0);}

async function fetchAll(url,headers){
  let all=[];
  while(url){
    const r=await fetch(url,{headers});
    const d=await r.json();
    if(d.error){console.warn('Stripe:',d.error.message);break;}
    all=all.concat(d.data||[]);
    url=d.has_more?url.split('?')[0]+'?limit=100&starting_after='+d.data[d.data.length-1].id:null;
  }
  return all;
}

async function loadStripe(){
  try{
    const h={Authorization:'Bearer '+PK};
    // Load products + images
    const prods=await fetchAll('https://api.stripe.com/v1/products?limit=100&active=true',h);
    const imgMap={};
    prods.forEach(p=>{if(p.images&&p.images[0])imgMap[p.id]=p.images[0];});
    // Load payment links
    const links=await fetchAll('https://api.stripe.com/v1/payment_links?limit=100&active=true',h);
    // For each link fetch line items to get product mapping
    const linkMap={};
    await Promise.all(links.map(async lnk=>{
      try{
        const r=await fetch('https://api.stripe.com/v1/payment_links/'+lnk.id+'/line_items?limit=5',{headers:h});
        const d=await r.json();
        (d.data||[]).forEach(item=>{
          if(item.price&&item.price.product) linkMap[item.price.product]=lnk.url||('https://buy.stripe.com/'+lnk.id);
        });
      }catch(e){}
    }));
    // Update products
    P=STATIC.map(p=>{
      if(imgMap[p.id]) p.imageUrl=imgMap[p.id];
      if(linkMap[p.id]) p.paymentLink=linkMap[p.id];
      return p;
    });
    render();
    console.log('Stripe loaded: '+prods.length+' products, '+links.length+' payment links');
  }catch(e){console.log('Stripe error:',e);render();}
}

render();
loadStripe();
</script>
